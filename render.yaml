# Full cloud deployment — AI Content Studio
#
# Vercel  = Web + API only (already deployed)
# Render  = Worker + Renderer (video generation) — REQUIRED
# Neon    = Database (already configured)
# Upstash = Redis queues (already configured)
# R2      = Video/audio file storage (REQUIRED for Vercel playback)

services:
  - type: worker
    name: ai-studio-pipeline
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./infrastructure/docker/Dockerfile.pipeline
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOCAL_MEDIA_DIR
        value: /data/media
      - key: LOCAL_MEDIA_PORT
        value: '3001'
      - key: COST_SAVER_MODE
        value: 'true'
      - key: COST_SAVER_AUTO_APPROVE
        value: 'true'
      - key: COST_SAVER_SKIP_THUMBNAIL
        value: 'true'
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: R2_BUCKET_NAME
        value: ai-content-studio
      # Paste these in Render dashboard when creating the blueprint:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: PIXABAY_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
    disk:
      name: pipeline-media
      mountPath: /data/media
      sizeGB: 1

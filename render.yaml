
services:
  - type: worker
    name: ai-studio-pipeline
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./infrastructure/docker/Dockerfile.pipeline
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOCAL_MEDIA_DIR
        value: /data/media
      - key: LOCAL_MEDIA_PORT
        value: '3001'
      - key: COST_SAVER_MODE
        value: 'true'
      - key: COST_SAVER_AUTO_APPROVE
        value: 'true'
      - key: COST_SAVER_SKIP_THUMBNAIL
        value: 'true'
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: PIXABAY_API_KEY
        sync: false
    disk:
      name: pipeline-media
      mountPath: /data/media
      sizeGB: 1

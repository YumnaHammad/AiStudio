name: AI Content Studio CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: acs
          POSTGRES_PASSWORD: acs_secret
          POSTGRES_DB: ai_content_studio
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build --workspace=@acs/shared
      - run: npm run generate --workspace=@acs/database
      - run: npm run build --workspace=@acs/database
      - run: npm run build --workspace=@acs/providers
      - run: npm run build --workspace=@acs/ai-workers
      - run: npm run build --workspace=@acs/rendering
      - run: npm run build --workspace=@acs/api
      - run: npm run build --workspace=@acs/worker
      - run: npm run build --workspace=@acs/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_WS_URL: http://localhost:4000

      - run: npm run db:migrate:deploy
        env:
          DATABASE_URL: postgresql://acs:acs_secret@localhost:5432/ai_content_studio?schema=public

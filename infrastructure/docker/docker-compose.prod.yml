services:
  postgres:
    image: postgres:16-alpine
    container_name: acs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: acs
      POSTGRES_PASSWORD: acs_secret
      POSTGRES_DB: ai_content_studio
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U acs -d ai_content_studio']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: acs-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: acs-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://acs:acs_secret@postgres:5432/ai_content_studio?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-min-32-chars-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-min-32-chars-long}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-byte-hex-key-for-aes256gcm}
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      PIXABAY_API_KEY: ${PIXABAY_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.worker
    container_name: acs-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://acs:acs_secret@postgres:5432/ai_content_studio?schema=public
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-byte-hex-key-for-aes256gcm}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      PIXABAY_API_KEY: ${PIXABAY_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  renderer:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.renderer
    container_name: acs-renderer
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://acs:acs_secret@postgres:5432/ai_content_studio?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
        NEXT_PUBLIC_WS_URL: http://localhost:4000
    container_name: acs-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
